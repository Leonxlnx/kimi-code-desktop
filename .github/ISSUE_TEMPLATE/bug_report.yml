name: Bug report
description: Report a reproducible problem in Kimi Code Desktop.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Do not include credentials, account tokens, or private project files.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.8.3
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: input
    id: kimi
    attributes:
      label: Kimi Code CLI version
      description: Run `kimi --version`.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and the behavior you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant diagnostics
      description: Paste only sanitized diagnostics. Remove tokens, private paths, and project content.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed credentials and private information.
          required: true
